version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: questxp-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: questxp-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: questxp-backend
    ports:
      - "5002:5000"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/questxp
      - REDIS_URL=redis://redis:6379
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: questxp-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
